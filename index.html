<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSO - Based Allowance Replenishment System</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { color: #2d3748; font-size: 24px; margin-bottom: 5px; }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
        }
        .status-connected { background: #c6f6d5; color: #22543d; }
        .status-disconnected { background: #fed7d7; color: #742a2a; }
        .status-checking { background: #feebc8; color: #7b341e; }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 0; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .expense-row {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .expense-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .remove-expense {
            background: #fc8181;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .expense-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #48bb78; color: white; }
        .btn-info { background: #4299e1; color: white; }
        .btn-danger { background: #fc8181; color: white; }
        .btn-warning { background: #ed8936; color: white; }
        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .message.success { background: #c6f6d5; color: #22543d; display: block; }
        .message.error { background: #fed7d7; color: #742a2a; display: block; }
        .message.info { background: #bee3f8; color: #2c5282; display: block; }
        .summary {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .summary-item { text-align: center; }
        .summary-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading.active { display: flex; }
        .spinner {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .records-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .record-item {
            background: #f7fafc;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }
        .record-item:hover {
            background: #edf2f7;
            transform: translateX(5px);
            border-color: #667eea;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 700px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #a0aec0;
        }
        .debug-info {
            background: #1a1a2e;
            color: #00ff88;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .credentials-warning {
            background: #fed7d7;
            color: #742a2a;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BASED ALLOWANCE REPLENISHMENT (FSO)</h1>
            <p>Field Service Office - Expense Reimbursement System</p>
            <div id="connectionStatus" class="status-badge status-checking">🔍 Checking Supabase connection...</div>
            <div id="debugInfo" class="debug-info"></div>
        </div>

        <div class="card">
            <form id="mainForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Field Engineers Name *</label>
                        <input type="text" id="fieldEngineerName" required>
                    </div>
                    <div class="form-group">
                        <label>Date Coverage (Start) *</label>
                        <input type="date" id="dateCoverageStart" required>
                    </div>
                    <div class="form-group">
                        <label>Date Coverage (End) *</label>
                        <input type="date" id="dateCoverageEnd" required>
                    </div>
                    <div class="form-group">
                        <label>Cluster *</label>
                        <input type="text" id="cluster" required>
                    </div>
                    <div class="form-group">
                        <label>Date Filed</label>
                        <input type="date" id="dateFiled" readonly style="background: #f7fafc;">
                    </div>
                    <div class="form-group">
                        <label>Team Lead *</label>
                        <input type="text" id="teamLead" required>
                    </div>
                </div>

                <div style="margin: 20px 0;">
                    <h3>Expense Entries</h3>
                    <button type="button" id="addExpenseBtn" class="btn btn-info">+ Add Expense Entry</button>
                </div>

                <div id="expensesContainer"></div>
                <div id="summaryContainer"></div>

                <div class="action-buttons">
                    <button type="button" id="exportExcelBtn" class="btn btn-secondary">📊 Export to Excel</button>
                    <button type="button" id="saveToCloudBtn" class="btn btn-primary">☁️ Save to Cloud</button>
                    <button type="button" id="loadFromCloudBtn" class="btn btn-info">📋 Load from Cloud</button>
                    <button type="button" id="saveLocalBtn" class="btn btn-warning">💾 Save Locally</button>
                    <button type="button" id="loadLocalBtn" class="btn btn-info">📂 Load Local</button>
                    <button type="button" id="resetBtn" class="btn btn-danger">🔄 Reset Form</button>
                </div>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <div id="recordsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Saved Reports</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div id="recordsList" class="records-list"></div>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner">Loading...</div>
    </div>

    <script>
        // ==================== SUPABASE CONFIGURATION ====================
        // !!! IMPORTANT: REPLACE THESE WITH YOUR ACTUAL CREDENTIALS FROM SUPABASE !!!
        // Go to: Project Settings → API → Project URL and anon public key
        const SUPABASE_URL = 'https://tatrpmfidwweefgldcix.supabase.co';  // ← PASTE YOUR FULL URL HERE
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdHJwbWZpZHd3ZWVmZ2xkY2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzY1MTUsImV4cCI6MjA5MTg1MjUxNX0.g3SrGJslhpA1hJDLjD3zJE4JuEwJDSM_c2-eXnC-jKk';  // ← PASTE YOUR ANON KEY HERE
        
        // Global variables
        let expenses = [];
        let isConnected = false;
        let supabaseClient = null;

        // Set today's date
        document.getElementById('dateFiled').value = new Date().toISOString().split('T')[0];

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 3000);
        }

        function setLoading(show) {
            const loadingDiv = document.getElementById('loading');
            if (show) {
                loadingDiv.classList.add('active');
            } else {
                loadingDiv.classList.remove('active');
            }
        }

        function addDebugInfo(message) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${message}<br>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(message);
        }

        // ==================== SUPABASE INITIALIZATION ====================
        async function initSupabase() {
            addDebugInfo('=== Supabase Initialization Started ===');
            addDebugInfo(`URL: ${SUPABASE_URL}`);
            addDebugInfo(`Key: ${SUPABASE_ANON_KEY.substring(0, 30)}...`);
            
            // Check if credentials are still placeholders
            if (SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) {
                addDebugInfo('⚠️ WARNING: Using placeholder credentials!');
                addDebugInfo('Please replace SUPABASE_URL and SUPABASE_ANON_KEY with your actual Supabase credentials');
                document.getElementById('connectionStatus').innerHTML = '⚠️ Configure Supabase credentials';
                document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
                return;
            }
            
            try {
                addDebugInfo('Creating Supabase client...');
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                addDebugInfo('✓ Supabase client created');
                
                addDebugInfo('Testing connection to fso_reports table...');
                const { data, error } = await supabaseClient
                    .from('fso_reports')
                    .select('count', { count: 'exact', head: true });
                
                if (error) {
                    addDebugInfo(`✗ Connection error: ${error.message}`);
                    if (error.message.includes('JWT')) {
                        addDebugInfo('Invalid API key. Please check your anon/public key.');
                    } else if (error.message.includes('relation')) {
                        addDebugInfo('Table "fso_reports" does not exist. Please run the SQL script in Supabase.');
                    }
                    document.getElementById('connectionStatus').innerHTML = `🔴 ${error.message.substring(0, 50)}`;
                    document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
                    isConnected = false;
                } else {
                    addDebugInfo('✓ Supabase connected successfully!');
                    document.getElementById('connectionStatus').innerHTML = '🟢 Connected to Supabase';
                    document.getElementById('connectionStatus').className = 'status-badge status-connected';
                    showMessage('Connected to Supabase! You can now save to cloud.', 'success');
                    isConnected = true;
                }
            } catch (error) {
                addDebugInfo(`✗ Exception: ${error.message}`);
                console.error('Supabase error:', error);
                document.getElementById('connectionStatus').innerHTML = '🔴 Connection failed - check network';
                document.getElementById('connectionStatus').className = 'status-badge status-disconnected';
                isConnected = false;
            }
            addDebugInfo('=== Initialization Complete ===');
        }

        // ==================== EXPENSE MANAGEMENT ====================
        function renderExpenses() {
            const container = document.getElementById('expensesContainer');
            if (expenses.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #a0aec0;">No expense entries yet. Click "Add Expense Entry" to begin.</div>';
                return;
            }

            container.innerHTML = expenses.map((expense, index) => `
                <div class="expense-row" data-index="${index}">
                    <div class="expense-header">
                        <strong>Expense Entry #${index + 1}</strong>
                        <button type="button" class="remove-expense" onclick="removeExpense(${index})">Remove</button>
                    </div>
                    <div class="expense-fields">
                        <div><label>Activity Date *</label><input type="date" value="${expense.activityDate || ''}" onchange="updateExpense(${index}, 'activityDate', this.value)"></div>
                        <div><label>FP Ticket</label><input type="text" value="${expense.fpTicket || ''}" onchange="updateExpense(${index}, 'fpTicket', this.value)"></div>
                        <div><label>Project Name *</label><input type="text" value="${expense.projectName || ''}" onchange="updateExpense(${index}, 'projectName', this.value)"></div>
                        <div><label>PO Number</label><input type="text" value="${expense.poNumber || ''}" onchange="updateExpense(${index}, 'poNumber', this.value)"></div>
                        <div><label>Launch Point</label><input type="text" value="${expense.launchPoint || ''}" onchange="updateExpense(${index}, 'launchPoint', this.value)"></div>
                        <div><label>Client Address</label><input type="text" value="${expense.clientAddress || ''}" onchange="updateExpense(${index}, 'clientAddress', this.value)"></div>
                        <div><label>Distance (KM)</label><input type="number" step="0.1" value="${expense.distance || ''}" onchange="updateExpense(${index}, 'distance', this.value)"></div>
                        <div><label>Transpo (₱)</label><input type="number" step="0.01" value="${expense.transpo || 0}" onchange="updateExpense(${index}, 'transpo', this.value)"></div>
                        <div><label>Meal (₱)</label><input type="number" step="0.01" value="${expense.meal || 0}" onchange="updateExpense(${index}, 'meal', this.value)"></div>
                        <div><label>Lodging (₱)</label><input type="number" step="0.01" value="${expense.lodging || 0}" onchange="updateExpense(${index}, 'lodging', this.value)"></div>
                        <div><label>Materials (₱)</label><input type="number" step="0.01" value="${expense.materials || 0}" onchange="updateExpense(${index}, 'materials', this.value)"></div>
                        <div><label>Print (₱)</label><input type="number" step="0.01" value="${expense.print || 0}" onchange="updateExpense(${index}, 'print', this.value)"></div>
                        <div><label>Freight (₱)</label><input type="number" step="0.01" value="${expense.freight || 0}" onchange="updateExpense(${index}, 'freight', this.value)"></div>
                        <div><label>Rental (₱)</label><input type="number" step="0.01" value="${expense.rental || 0}" onchange="updateExpense(${index}, 'rental', this.value)"></div>
                        <div><label>Others (₱)</label><input type="number" step="0.01" value="${expense.others || 0}" onchange="updateExpense(${index}, 'others', this.value)"></div>
                    </div>
                </div>
            `).join('');
            updateSummary();
        }

        function updateExpense(index, field, value) {
            expenses[index][field] = value;
            updateSummary();
        }

        function removeExpense(index) {
            expenses.splice(index, 1);
            renderExpenses();
        }

        function addExpense() {
            expenses.push({
                activityDate: '', fpTicket: '', projectName: '', poNumber: '', launchPoint: '',
                clientAddress: '', distance: '', transpo: 0, meal: 0, lodging: 0, materials: 0,
                print: 0, freight: 0, rental: 0, others: 0
            });
            renderExpenses();
        }

        function calculateTotals() {
            const totals = { transpo: 0, meal: 0, lodging: 0, materials: 0, print: 0, freight: 0, rental: 0, others: 0, total: 0 };
            expenses.forEach(expense => {
                totals.transpo += parseFloat(expense.transpo) || 0;
                totals.meal += parseFloat(expense.meal) || 0;
                totals.lodging += parseFloat(expense.lodging) || 0;
                totals.materials += parseFloat(expense.materials) || 0;
                totals.print += parseFloat(expense.print) || 0;
                totals.freight += parseFloat(expense.freight) || 0;
                totals.rental += parseFloat(expense.rental) || 0;
                totals.others += parseFloat(expense.others) || 0;
            });
            totals.total = totals.transpo + totals.meal + totals.lodging + totals.materials + totals.print + totals.freight + totals.rental + totals.others;
            return totals;
        }

        function updateSummary() {
            const totals = calculateTotals();
            document.getElementById('summaryContainer').innerHTML = `
                <div class="summary">
                    <h3>Summary</h3>
                    <div class="summary-grid">
                        <div class="summary-item"><div class="summary-value">₱ ${totals.transpo.toFixed(2)}</div><div>Transpo</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.meal.toFixed(2)}</div><div>Meal</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.lodging.toFixed(2)}</div><div>Lodging</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.materials.toFixed(2)}</div><div>Materials</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.print.toFixed(2)}</div><div>Print</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.freight.toFixed(2)}</div><div>Freight</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.rental.toFixed(2)}</div><div>Rental</div></div>
                        <div class="summary-item"><div class="summary-value">₱ ${totals.others.toFixed(2)}</div><div>Others</div></div>
                        <div class="summary-item"><div class="summary-value" style="font-size:24px;">₱ ${totals.total.toFixed(2)}</div><div><strong>GRAND TOTAL</strong></div></div>
                    </div>
                </div>
            `;
        }

        // ==================== EXCEL EXPORT ====================
        function exportToExcel() {
            const formData = {
                fieldEngineerName: document.getElementById('fieldEngineerName').value,
                dateCoverageStart: document.getElementById('dateCoverageStart').value,
                dateCoverageEnd: document.getElementById('dateCoverageEnd').value,
                cluster: document.getElementById('cluster').value,
                dateFiled: document.getElementById('dateFiled').value,
                teamLead: document.getElementById('teamLead').value
            };
            const totals = calculateTotals();
            const worksheetData = [
                ['BASED ALLOWANCE REPLENISHMENT (FSO)', '', '', '', '', '', '', '', '', '', '', '', '', '', '', ''],
                [],
                ['Field Engineers Name:', formData.fieldEngineerName, 'Date Coverage:', `${formData.dateCoverageStart} to ${formData.dateCoverageEnd}`, '', '', '', '', '', '', '', '', '', '', '', 'rev. 1.0 10.07.2024'],
                ['Cluster:', formData.cluster, 'Date Filed:', formData.dateFiled, '', '', '', '', '', '', '', '', '', '', '', ''],
                ['Team Lead:', formData.teamLead, '', '', '', '', '', '', '', '', '', '', '', '', '', ''],
                [],
                ['Activity Date', 'FP ticket', 'Project Name', 'PO#', 'Launch Point', 'Client Address', 'Distance', 'Transpo', 'Meal', 'Lodging', 'Materials', 'Print', 'Freight', 'Rental', 'Others', 'Total']
            ];
            expenses.forEach(expense => {
                const total = (parseFloat(expense.transpo)||0) + (parseFloat(expense.meal)||0) + (parseFloat(expense.lodging)||0) + (parseFloat(expense.materials)||0) + (parseFloat(expense.print)||0) + (parseFloat(expense.freight)||0) + (parseFloat(expense.rental)||0) + (parseFloat(expense.others)||0);
                worksheetData.push([expense.activityDate||'', expense.fpTicket||'', expense.projectName||'', expense.poNumber||'', expense.launchPoint||'', expense.clientAddress||'', expense.distance||'', expense.transpo||0, expense.meal||0, expense.lodging||0, expense.materials||0, expense.print||0, expense.freight||0, expense.rental||0, expense.others||0, total]);
            });
            worksheetData.push([], ['', '', '', '', '', '', '', '', '', '', '', '', '', '', 'Grand Total', totals.total]);
            const ws = XLSX.utils.aoa_to_sheet(worksheetData);
            ws['!cols'] = [{wch:12},{wch:15},{wch:40},{wch:20},{wch:15},{wch:35},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12}];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'FSO Expense Report');
            XLSX.writeFile(wb, `FSO_Report_${formData.fieldEngineerName}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
            showMessage('Excel file generated!', 'success');
        }

        // ==================== SUPABASE OPERATIONS ====================
        async function saveToCloud() {
            if (!isConnected || !supabaseClient) {
                showMessage('Supabase not connected. Check your credentials in the code.', 'error');
                return;
            }
            const engineerName = document.getElementById('fieldEngineerName').value;
            if (!engineerName) { showMessage('Please fill in Engineer Name', 'error'); return; }
            setLoading(true);
            const reportData = {
                engineer_name: engineerName,
                coverage_start: document.getElementById('dateCoverageStart').value,
                coverage_end: document.getElementById('dateCoverageEnd').value,
                cluster: document.getElementById('cluster').value,
                date_filed: document.getElementById('dateFiled').value,
                team_lead: document.getElementById('teamLead').value,
                expenses: expenses,
                totals: calculateTotals()
            };
            addDebugInfo('Saving to Supabase...');
            try {
                const { error } = await supabaseClient.from('fso_reports').insert([reportData]);
                if (error) throw error;
                addDebugInfo('✓ Save successful!');
                showMessage('Report saved to cloud!', 'success');
            } catch (error) {
                addDebugInfo(`✗ Save error: ${error.message}`);
                showMessage('Error: ' + error.message, 'error');
            } finally { setLoading(false); }
        }

        async function loadFromCloud() {
            if (!isConnected || !supabaseClient) {
                showMessage('Supabase not connected.', 'error');
                return;
            }
            setLoading(true);
            addDebugInfo('Loading records...');
            try {
                const { data, error } = await supabaseClient.from('fso_reports').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                addDebugInfo(`Loaded ${data?.length || 0} records`);
                if (data && data.length > 0) {
                    const modal = document.getElementById('recordsModal');
                    const recordsList = document.getElementById('recordsList');
                    recordsList.innerHTML = data.map(record => `
                        <div class="record-item" onclick="loadSelectedRecord(${record.id})">
                            <strong>${record.engineer_name}</strong><br>
                            📅 ${record.coverage_start} to ${record.coverage_end}<br>
                            📍 ${record.cluster} | 👤 ${record.team_lead}<br>
                            💰 ₱ ${record.totals?.total || 0}
                        </div>
                    `).join('');
                    modal.classList.add('active');
                } else {
                    showMessage('No records found', 'info');
                }
            } catch (error) {
                addDebugInfo(`✗ Load error: ${error.message}`);
                showMessage('Error: ' + error.message, 'error');
            } finally { setLoading(false); }
        }

        async function loadSelectedRecord(id) {
            if (!supabaseClient) return;
            setLoading(true);
            closeModal();
            try {
                const { data, error } = await supabaseClient.from('fso_reports').select('*').eq('id', id).single();
                if (error) throw error;
                if (data) {
                    document.getElementById('fieldEngineerName').value = data.engineer_name || '';
                    document.getElementById('dateCoverageStart').value = data.coverage_start || '';
                    document.getElementById('dateCoverageEnd').value = data.coverage_end || '';
                    document.getElementById('cluster').value = data.cluster || '';
                    document.getElementById('dateFiled').value = data.date_filed || new Date().toISOString().split('T')[0];
                    document.getElementById('teamLead').value = data.team_lead || '';
                    expenses = data.expenses || [];
                    renderExpenses();
                    showMessage('Record loaded!', 'success');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally { setLoading(false); }
        }

        function closeModal() { document.getElementById('recordsModal').classList.remove('active'); }

        // ==================== LOCAL STORAGE ====================
        function saveLocally() {
            const formData = {
                header: {
                    fieldEngineerName: document.getElementById('fieldEngineerName').value,
                    dateCoverageStart: document.getElementById('dateCoverageStart').value,
                    dateCoverageEnd: document.getElementById('dateCoverageEnd').value,
                    cluster: document.getElementById('cluster').value,
                    dateFiled: document.getElementById('dateFiled').value,
                    teamLead: document.getElementById('teamLead').value
                },
                expenses: expenses,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem('fso_report', JSON.stringify(formData));
            showMessage('Saved locally!', 'success');
        }

        function loadLocalData() {
            const saved = localStorage.getItem('fso_report');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('fieldEngineerName').value = data.header.fieldEngineerName;
                document.getElementById('dateCoverageStart').value = data.header.dateCoverageStart;
                document.getElementById('dateCoverageEnd').value = data.header.dateCoverageEnd;
                document.getElementById('cluster').value = data.header.cluster;
                document.getElementById('dateFiled').value = data.header.dateFiled;
                document.getElementById('teamLead').value = data.header.teamLead;
                expenses = data.expenses;
                renderExpenses();
                showMessage('Loaded from local!', 'success');
            } else {
                showMessage('No saved data found', 'error');
            }
        }

        function resetForm() {
            if (confirm('Reset form? All data will be lost.')) {
                document.getElementById('mainForm').reset();
                document.getElementById('dateFiled').value = new Date().toISOString().split('T')[0];
                expenses = [];
                renderExpenses();
                showMessage('Form reset!', 'success');
            }
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('addExpenseBtn').addEventListener('click', addExpense);
        document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
        document.getElementById('saveToCloudBtn').addEventListener('click', saveToCloud);
        document.getElementById('loadFromCloudBtn').addEventListener('click', loadFromCloud);
        document.getElementById('saveLocalBtn').addEventListener('click', saveLocally);
        document.getElementById('loadLocalBtn').addEventListener('click', loadLocalData);
        document.getElementById('resetBtn').addEventListener('click', resetForm);
        
        // Initialize
        initSupabase();
        addExpense();
    </script>
</body>
</html>
